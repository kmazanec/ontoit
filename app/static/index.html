<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OntoIt — Tax-Filing Assistant</title>
<style>
  :root { --bg:#f7f8fa; --ink:#1a2b4a; --muted:#5a6b82; --line:#e2e6ec; --accent:#c0532a; --ok:#1f7a4d; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
         color:var(--ink); background:var(--bg); }
  header { padding:16px 24px; border-bottom:1px solid var(--line); background:#fff; }
  header h1 { margin:0; font-size:18px; }
  header p { margin:4px 0 0; font-size:13px; color:var(--muted); }
  main { display:grid; grid-template-columns:1fr 380px; gap:0; height:calc(100vh - 65px); }
  @media (max-width:820px){ main{ grid-template-columns:1fr; height:auto; } }
  .chat { display:flex; flex-direction:column; border-right:1px solid var(--line); background:#fff; }
  .messages { flex:1; overflow-y:auto; padding:20px; }
  .msg { margin-bottom:14px; max-width:80%; padding:10px 14px; border-radius:12px; line-height:1.45; font-size:14px; }
  .msg.assistant { background:#eef2f7; }
  .msg.system { background:transparent; color:var(--muted); font-size:13px; font-style:italic; max-width:100%; padding:4px 0; }
  .controls { padding:16px 20px; border-top:1px solid var(--line); display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  button { font:inherit; font-size:14px; padding:8px 14px; border:1px solid var(--line); border-radius:8px;
           background:#fff; color:var(--ink); cursor:pointer; }
  button.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
  button:disabled { opacity:.5; cursor:default; }
  .panel { display:flex; flex-direction:column; background:#fbfcfd; }
  .panel h2 { margin:0; padding:14px 18px; font-size:12px; letter-spacing:.08em; text-transform:uppercase;
              color:var(--muted); border-bottom:1px solid var(--line); }
  .trail { flex:1; overflow-y:auto; padding:12px 14px; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:12px; }
  .ev { padding:8px 10px; margin-bottom:8px; border:1px solid var(--line); border-left:3px solid var(--muted); border-radius:6px; background:#fff; }
  .ev .k { color:var(--accent); font-weight:600; }
  .ev .s { color:var(--ink); }
  .ev .meta { color:var(--muted); margin-top:3px; }
  .ev.phase_change { border-left-color:#3b6cb0; }
  .ev.tool_call, .ev.tool_result { border-left-color:var(--ok); }
  .ev.guardrail, .ev.validation { border-left-color:var(--accent); }
  .ev.message { border-left-color:#8a6bb0; }
  .qc { padding:10px 18px; border-top:1px solid var(--line); font-size:12px; color:var(--muted); }
  .qc b { color:var(--ink); }
  .note { padding:10px 20px; font-size:12px; color:var(--muted); }
</style>
</head>
<body>
<header>
  <h1>OntoIt — Tax-Filing Assistant</h1>
  <p>Educational prototype · not tax advice · fake data only</p>
</header>
<main>
  <section class="chat">
    <div class="messages" id="messages">
      <div class="msg system">Upload your W-2 or use the bundled sample to begin.</div>
    </div>
    <div class="controls">
      <button class="primary" id="sampleBtn">Use the sample W-2</button>
      <input type="file" id="fileInput" accept="application/pdf,image/png,image/jpeg" style="display:none">
      <button id="uploadBtn">Upload a W-2</button>
    </div>
    <div class="note">No real data is stored — your session lives only in a signed cookie in your browser.</div>
  </section>
  <aside class="panel">
    <h2>Observation trail (live)</h2>
    <div class="trail" id="trail"></div>
    <div class="qc">Questions asked: <b id="qcount">0</b> / 5</div>
  </aside>
</main>

<script>
const messages = document.getElementById('messages');
const trail = document.getElementById('trail');
const qcount = document.getElementById('qcount');
const sampleBtn = document.getElementById('sampleBtn');
const uploadBtn = document.getElementById('uploadBtn');
const fileInput = document.getElementById('fileInput');

function addMessage(text, cls) {
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.textContent = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function addEvent(ev) {
  const div = document.createElement('div');
  div.className = 'ev ' + ev.kind;
  let meta = [];
  if (ev.tool) meta.push('tool: ' + ev.tool);
  if (ev.phase) meta.push('phase: ' + ev.phase);
  div.innerHTML = '<span class="k">' + ev.kind + '</span> <span class="s"></span>'
    + (meta.length ? '<div class="meta">' + meta.join(' · ') + '</div>' : '');
  div.querySelector('.s').textContent = ev.summary;
  trail.appendChild(div);
  trail.scrollTop = trail.scrollHeight;
  qcount.textContent = ev.question_count;
}

function runStream() {
  const es = new EventSource('/stream');
  es.addEventListener('observation', (e) => addEvent(JSON.parse(e.data)));
  es.addEventListener('assistant', (e) => addMessage(JSON.parse(e.data).text, 'assistant'));
  es.addEventListener('error', (e) => {
    if (e.data) { try { addMessage(JSON.parse(e.data).summary || 'Error', 'system'); } catch (_) {} }
  });
  es.addEventListener('done', () => es.close());
}

async function loadSample() {
  sampleBtn.disabled = true; uploadBtn.disabled = true;
  addMessage('Using the sample W-2.', 'system');
  await fetch('/session/sample', { method: 'POST' });
  runStream();
}

uploadBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', async () => {
  if (!fileInput.files.length) return;
  sampleBtn.disabled = true; uploadBtn.disabled = true;
  addMessage('Uploading your W-2…', 'system');
  const fd = new FormData();
  fd.append('file', fileInput.files[0]);
  const resp = await fetch('/session/upload', { method: 'POST', body: fd });
  const data = await resp.json();
  if (!data.ok) { addMessage(data.error || 'Upload failed.', 'system'); sampleBtn.disabled = false; uploadBtn.disabled = false; return; }
  runStream();
});
sampleBtn.addEventListener('click', loadSample);
</script>
</body>
</html>
